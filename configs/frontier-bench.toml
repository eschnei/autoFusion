# Frontier benchmark profile — the real "autoFusion vs. the field" run.
# A curated, diverse basket across Anthropic + OpenAI + OpenRouter(open) + local.
# Keys come from .env (ANTHROPIC_API_KEY, OPENAI_API_KEY, OPENROUTER_API_KEY).
#
#   autofusion -c configs/frontier-bench.toml config-check          # confirm keys
#   autofusion -c configs/frontier-bench.toml registry              # capabilities + cost
#   autofusion -c configs/frontier-bench.toml report --benchmarks humaneval,gsm8k -n 15   # smoke (~$5)
#   autofusion -c configs/frontier-bench.toml report --benchmarks humaneval,gsm8k,livecodebench -n 50  # full
#
# WARNING: this spends REAL money. The [budget] cap below is enforced BEFORE every
# call fires. Costs per token are approximate (for budget estimation) — verify
# OpenRouter model slugs + live prices at https://openrouter.ai/models.

# ---------- Anthropic (the bar + cheap-but-strong members) ----------
[[models]]
name = "opus"            # claude-opus-4-8 — THE BAR to beat
model = "anthropic/claude-opus-4-8"
input_cost_per_token = 0.000005
output_cost_per_token = 0.000025
capabilities = ["code", "reasoning", "general"]

[[models]]
name = "sonnet"
model = "anthropic/claude-sonnet-4-6"
input_cost_per_token = 0.000003
output_cost_per_token = 0.000015
capabilities = ["code", "reasoning", "general"]

[[models]]
name = "haiku"
model = "anthropic/claude-haiku-4-5"
input_cost_per_token = 0.000001
output_cost_per_token = 0.000005
capabilities = ["general", "chat"]

# ---------- OpenAI ----------
[[models]]
name = "gpt-4o"
model = "gpt-4o"
input_cost_per_token = 0.0000025
output_cost_per_token = 0.00001
capabilities = ["code", "reasoning", "general"]

[[models]]
name = "gpt-4o-mini"
model = "gpt-4o-mini"
input_cost_per_token = 0.00000015
output_cost_per_token = 0.0000006
capabilities = ["general", "chat"]

# ---------- OpenRouter — diverse STRONG-OPEN basket (cheap) ----------
# Verify exact slugs at https://openrouter.ai/models and swap as you like.
[[models]]
name = "deepseek"
model = "openrouter/deepseek/deepseek-chat"
input_cost_per_token = 0.00000014
output_cost_per_token = 0.00000028
capabilities = ["code", "reasoning", "general"]

[[models]]
name = "qwen-72b"
model = "openrouter/qwen/qwen-2.5-72b-instruct"
input_cost_per_token = 0.00000035
output_cost_per_token = 0.0000004
capabilities = ["reasoning", "general"]

[[models]]
name = "llama-70b"
model = "openrouter/meta-llama/llama-3.3-70b-instruct"
input_cost_per_token = 0.0000003
output_cost_per_token = 0.0000004
capabilities = ["general", "reasoning"]

# ---------- Local (free proposers for the cheap recipes) ----------
[[models]]
name = "llama3.2"
model = "ollama/llama3.2"
api_base = "http://localhost:11434"
input_cost_per_token = 0.0
output_cost_per_token = 0.0
capabilities = ["general", "chat"]

[[models]]
name = "qwen2.5-coder"
model = "ollama/qwen2.5-coder:7b"
api_base = "http://localhost:11434"
input_cost_per_token = 0.0
output_cost_per_token = 0.0
capabilities = ["code", "reasoning"]

# ---------- Recipes (the "us" side) ----------
[fusion]
# Diverse strong-open proposers, synthesized by the strongest model.
proposers = ["deepseek", "qwen-72b", "llama-70b"]
aggregator = "opus"
layers = 1

[router]
default = "haiku"
[[router.rules]]
match = "code|function|algorithm|def |class |implement|array|sort"
model = "deepseek"
[[router.rules]]
match = "math|calculate|sum|equation|number|prove|probability"
model = "qwen-72b"

[cascade]
# Cheapest frontier first; escalate only when the critic isn't confident.
tiers = ["haiku", "gpt-4o", "opus"]
critic = "haiku"
threshold = 0.7

[bestofn]
# Sample the cheap-strong-open basket; verifier (eval) or critic picks the winner.
models = ["deepseek", "qwen-72b", "llama-70b", "gpt-4o-mini"]
n = 4
critic = "haiku"
temperature = 0.7

[code]
# Coding basket for `autofusion code` (verify-in-the-loop). Code-strong models.
models = ["deepseek", "qwen2.5-coder", "gpt-4o"]
critic = "haiku"
n = 4
temperature = 0.7

[categories]
# `auto`: classify the task, route to the recipe our data says wins per category.
default = "opus"                       # reasoning/writing — frontier leads
[[categories.rules]]
match = "code|function|def |class |implement|algorithm|bug|refactor|program|script"
strategy = "bestofMarj"                 # verifiable code — verify-and-select wins
[[categories.rules]]
match = "math|calculate|equation|prove|probability|arithmetic|compute"
strategy = "routeMarj"

[budget]
# HARD cap — enforced before any call fires. Control real spend with -n.
per_request_usd = 0.50
total_usd = 25.0

# autoFusion configuration.
# Models are the building blocks; the registry records the litellm model id,
# optional api_base, and per-token cost (0 for local = free, skips budget checks).
# API keys are read from the environment / .env — NEVER stored here.

[[models]]
name = "llama3.2"
model = "ollama/llama3.2"
api_base = "http://localhost:11434"
input_cost_per_token = 0.0
output_cost_per_token = 0.0

[[models]]
name = "qwen2.5"
model = "ollama/qwen2.5:3b"
api_base = "http://localhost:11434"
input_cost_per_token = 0.0
output_cost_per_token = 0.0

[[models]]
name = "qwen2.5-coder"
model = "ollama/qwen2.5-coder:7b"
api_base = "http://localhost:11434"
input_cost_per_token = 0.0
output_cost_per_token = 0.0

# Example hosted model (uncomment + add OPENAI_API_KEY to .env to use):
# [[models]]
# name = "gpt-4o-mini"
# model = "gpt-4o-mini"

# --- Forward-looking config (used in later phases) ---

[fusion]
# Phase 2: proposers each draft, aggregator synthesizes.
proposers = ["llama3.2", "qwen2.5"]
aggregator = "llama3.2"
layers = 1

[router]
# Phase 6: picks ONE model per request. First matching rule wins, else default.
default = "llama3.2"
[[router.rules]]
match = "code|function|algorithm|def |class |array|sort|implement"
model = "qwen2.5-coder"

[cascade]
# Phase 7: cheapest-first; critic scores each answer, escalate if below threshold.
tiers = ["llama3.2", "qwen2.5-coder"]
critic = "llama3.2"
threshold = 0.7

[budget]
# Phase 4: hard caps enforced before calls fire. null = unlimited.
per_request_usd = 0.50
total_usd = 10.0
